<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixMate | Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="brand-block">
        <a href="index.html" class="brand">FixMate</a>
        <h1>Forgot Password</h1>
        <p>Enter your registered email to generate a reset link.</p>
      </div>
      <form id="forgot-form" class="auth-form">
        <label>Email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com" required />
        <button type="submit" class="submit-btn">Generate Reset Link</button>
      </form>
      <p class="status" id="forgot-status"></p>
      <p><a class="admin-link" href="auth.html">Back to login</a></p>
    </section>
  </main>
  <script src="forgot-password.js"></script>
</body>
</html>
