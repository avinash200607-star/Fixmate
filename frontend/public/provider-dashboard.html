<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixMate Provider Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #f3f7ff;
      color: #0f2348;
    }
    .wrap {
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #e1eaf9;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 14px 34px rgba(12, 35, 72, 0.1);
    }
    h1 {
      margin: 0 0 10px;
      font-family: "Sora", sans-serif;
    }
    p {
      color: #5f6f89;
      margin: 6px 0;
    }
    .meta {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #e7eefc;
    }
    .link {
      display: inline-block;
      margin-top: 18px;
      color: #1f4b95;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">
        <span class="logo-icon">FM</span>
        <span class="logo-text">FixMate</span>
      </a>

      <nav class="menu">
        <a href="provider-dashboard.html" class="active">Dashboard</a>
        <a href="provider-bookings.html">Bookings</a>
        <a href="provider-profile.html">Profile</a>
      </nav>

      <div class="nav-actions">
        <button class="location-btn" type="button"><i class="fa-solid fa-location-dot"></i> New Delhi</button>
        <a class="btn btn-light" href="auth.html">Login</a>
        <a class="btn btn-primary" href="auth.html">Become a Provider</a>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <h1>Provider Dashboard</h1>
      <p>Welcome back! Manage your service bookings and availability.</p>
      <div class="meta">
        <p><strong>Name:</strong> <span id="provider-name">-</span></p>
        <p><strong>Email:</strong> <span id="provider-email">-</span></p>
        <p><strong>Service Type:</strong> <span id="provider-service">-</span></p>
      </div>
      <a href="provider-bookings.html" class="link">📅 Manage Bookings</a>
      <a href="provider-profile.html" class="link">📝 Create / Edit Profile</a>
      <a href="index.html" class="link">🏠 Go to homepage</a>
    </div>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("fixmateUser") || "{}");
    if (user.role !== "provider") {
      window.location.href = "auth.html";
    } else {
      document.getElementById("provider-name").textContent = user.name || "-";
      document.getElementById("provider-email").textContent = user.email || "-";
      document.getElementById("provider-service").textContent = user.serviceType || "-";
    }
  </script>
  <script src="logout.js"></script>
</body>
</html>
