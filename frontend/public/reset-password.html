<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixMate | Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="brand-block">
        <a href="index.html" class="brand">FixMate</a>
        <h1>Reset Password</h1>
        <p>Set your new account password.</p>
      </div>
      <form id="reset-form" class="auth-form">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Minimum 6 characters" required />
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password" required />
        <button type="submit" class="submit-btn">Reset Password</button>
      </form>
      <p class="status" id="reset-status"></p>
      <p><a class="admin-link" href="auth.html">Back to login</a></p>
    </section>
  </main>
  <script src="reset-password.js"></script>
</body>
</html>
